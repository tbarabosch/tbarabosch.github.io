  <title id="title">Search and subprocess wall time on M1 Pro</title>
  <desc id="desc">A logarithmic paired-dot plot comparing median search and complete subprocess wall time for five implementations on an Apple M1 Pro. Metal has the fastest search, while native C++ has the shortest complete subprocess time. Whiskers show median absolute deviation.</desc>
