---
layout: default
---

<main class="main-content">

  <article class="post">
    <header class="post-header">
      <p class="manual-label">NAME</p>
      <h1 class="post-title">{{ page.title }}</h1>
      <dl class="post-meta">
        <dt>date</dt>
        <dd><time datetime="{{ page.date | date: "%Y-%m-%d" }}">{{ page.date | date: "%Y-%m-%d" }}</time></dd>
        {% if page.tags and page.tags != empty %}
        <dt>tags</dt>
        <dd>
          <ul class="tag-list post-tags">
            {% for tag in page.tags %}
            <li><a class="tag-pill" href="{{ '/tags/' | relative_url }}#{{ tag | slugify }}">{{ tag }}</a></li>
            {% endfor %}
          </ul>
        </dd>
        {% endif %}
      </dl>
    </header><!-- .post-header -->
    <section class="manual-section" aria-labelledby="description-heading">
      <h2 id="description-heading" class="manual-label">DESCRIPTION</h2>
      <div class="post-content">
        {{content}}
      </div><!-- .post-content -->
    </section>
  </article><!-- .post -->

</main><!-- .main-content -->
