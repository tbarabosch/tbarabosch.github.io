# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site language
lang: en-US

# Site title
title: "Thomas Barabosch"

# A description of your site for meta tag, search engine results.
description: "Systems security, reverse engineering, malware analysis, and threat research."

# The subpath of your site, e.g. /blog, for generating urls.
baseurl: ""

# The base hostname & protocol of your site for where absolute urls are needed.
url: "https://tbarabosch.github.io"

# Favicon
favicon: images/favicon.png

# Site navigation - each item must have a title and a url.
navigation:
  - text: Home
    url: /
  - text: About
    url: /about/

# Colors
accent_color: '#9D00FF'

# Site footer
footer:
  content: "&copy; 2026 Thomas Barabosch"
  has_social: true

# Plugins
plugins:
  - jekyll-paginate

# http://jekyllrb.com/docs/pagination/
paginate: 3
paginate_path: '/page:num/'


# Permalinks
permalink: /:title/

# Conversion
markdown: kramdown

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Files used for local development, but not published by GitHub Pages.
exclude:
  - Containerfile
  - Gemfile
  - Gemfile.lock
  - scripts/
  - vendor/
