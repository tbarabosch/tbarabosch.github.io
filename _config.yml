# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site language
lang: en-US

# Site title
title: "Thomas Barabosch"

# A description of your site for meta tag, search engine results.
description: "Systems security, reverse engineering, threat research, incident response, cloud security, and AI-enabled tooling."

# The subpath of your site, e.g. /blog, for generating urls.
baseurl: ""

# The base hostname & protocol of your site for where absolute urls are needed.
url: "https://tbarabosch.com"

# Favicons
favicon: images/favicon.svg
favicon_png: images/favicon-32x32.png
apple_touch_icon: images/apple-touch-icon.png

# Site navigation - each item must have a title and a url.
navigation:
  - text: Home
    url: /
  - text: About
    url: /about/
  - text: RSS
    url: /feed.xml

# Site footer
footer:
  content: "&copy; 2026 Thomas Barabosch"

# Permalinks
permalink: /:title/

# Conversion
markdown: kramdown

# Sass
sass:
  sass_dir: _sass
  style: compressed

# Files used for local development, but not published by GitHub Pages.
exclude:
  - AGENTS.md
  - Containerfile
  - Gemfile
  - Gemfile.lock
  - scripts/
  - vendor/
