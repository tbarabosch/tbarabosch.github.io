---
layout: default
---

<main class="main-content">
  <section class="manual-section" aria-labelledby="name-heading">
    <h1 id="name-heading" class="manual-label">NAME</h1>
    <p class="manual-copy"><strong>{{ site.title }}</strong> - {{ site.description }}</p>
  </section>

  <section class="manual-section" aria-labelledby="articles-heading">
    <h2 id="articles-heading" class="manual-label">ARTICLES</h2>
    <ol class="article-list">
      {% for post in site.posts %}
      <li class="article-row">
        <time class="article-date" datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date: "%Y-%m-%d" }}</time>
        <a class="article-title" href="{{ site.baseurl }}{{ post.url }}" rel="bookmark">{{ post.title }}</a>
      </li>
      {% endfor %}
    </ol>
  </section>

</main><!-- .site-main -->
